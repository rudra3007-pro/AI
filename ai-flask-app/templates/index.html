<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus AI</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222;
    --border: #2a2a2a;
    --accent: #10a37f;
    --accent-dim: rgba(16,163,127,0.1);
    --text: #ececec;
    --text-muted: #8a8a8a;
    --text-faint: #444;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 54px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 9px;
    font-weight: 600;
    font-size: 0.95rem;
    letter-spacing: -0.01em;
  }

  .logo-mark {
    width: 26px; height: 26px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; color: white; font-weight: 700;
  }

  .clear-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 5px 13px;
    border-radius: 7px;
    cursor: pointer;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.78rem;
    transition: all 0.15s;
  }
  .clear-btn:hover { border-color: #3a3a3a; color: var(--text); background: var(--surface); }

  #chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 28px 0 8px;
    display: flex;
    flex-direction: column;
    scroll-behavior: smooth;
  }
  #chat-container::-webkit-scrollbar { width: 4px; }
  #chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 12px;
    padding: 40px 20px;
    animation: fadeUp 0.35s ease-out;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .welcome-icon {
    width: 48px; height: 48px;
    background: var(--accent);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem; margin-bottom: 4px;
  }

  .welcome h2 {
    font-size: 1.3rem; font-weight: 600;
    letter-spacing: -0.02em;
  }

  .welcome p {
    font-size: 0.85rem; color: var(--text-muted);
    max-width: 340px; text-align: center; line-height: 1.6;
  }

  .suggestions {
    display: flex; flex-wrap: wrap; gap: 7px;
    justify-content: center; margin-top: 8px; max-width: 500px;
  }

  .suggestion {
    padding: 7px 15px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 0.8rem; color: var(--text-muted);
    cursor: pointer; transition: all 0.15s;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .suggestion:hover { border-color: var(--accent); color: var(--text); background: var(--accent-dim); }

  .message {
    padding: 10px 0;
    animation: fadeUp 0.2s ease-out;
  }

  .message-inner {
    max-width: 700px;
    margin: 0 auto;
    padding: 0 22px;
    display: flex;
    gap: 13px;
    align-items: flex-start;
  }

  .avatar {
    width: 28px; height: 28px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.68rem; font-weight: 600;
    flex-shrink: 0; margin-top: 2px;
  }
  .message.user .avatar { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
  .message.ai .avatar { background: var(--accent); color: white; }

  .bubble {
    flex: 1;
    line-height: 1.7;
    font-size: 0.9rem;
    padding-top: 2px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .input-area {
    padding: 10px 20px 22px;
    flex-shrink: 0;
    margin-bottom: 60px;
  }

  .input-outer { max-width: 700px; margin: 0 auto; }

  .input-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .input-box:focus-within {
    border-color: #3a3a3a;
    box-shadow: 0 0 0 3px rgba(16,163,127,0.06);
  }

  .input-row {
    display: flex;
    align-items: flex-end;
    padding: 10px 10px 10px 14px;
    gap: 8px;
  }

  #user-input {
    flex: 1;
    background: none;
    border: none; outline: none;
    color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.9rem;
    resize: none;
    max-height: 160px;
    line-height: 1.55;
    padding: 2px 0;
  }
  #user-input::placeholder { color: var(--text-faint); }

  .input-actions {
    display: flex; align-items: center; gap: 6px; flex-shrink: 0;
  }

  #mic-btn {
    width: 34px; height: 34px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: none;
    color: var(--text-muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  #mic-btn svg { width: 15px; height: 15px; }
  #mic-btn:hover { border-color: #3a3a3a; color: var(--text); background: var(--surface2); }
  #mic-btn.recording {
    border-color: #e53e3e; color: #e53e3e;
    background: rgba(229,62,62,0.08);
    animation: recPulse 1.2s ease-in-out infinite;
  }
  @keyframes recPulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(229,62,62,0.3); }
    50% { box-shadow: 0 0 0 4px rgba(229,62,62,0); }
  }

  #send-btn {
    width: 34px; height: 34px;
    border-radius: 8px;
    background: var(--accent);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  #send-btn:hover { background: #0d8f6e; }
  #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  #send-btn svg { width: 15px; height: 15px; }

  .hint {
    font-size: 0.7rem; color: var(--text-faint);
    margin-top: 8px; text-align: center;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">N</div>
    Nexus AI
  </div>
  <button class="clear-btn" onclick="clearChat()">New chat</button>
</header>

<div id="chat-container">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">✦</div>
    <h2>How can I help you?</h2>
    <p>Ask me anything. Powered by Llama 3.3 70B via Groq.</p>
    <div class="suggestions">
      <span class="suggestion" onclick="sendSuggestion('Explain quantum computing simply')">Explain quantum computing</span>
      <span class="suggestion" onclick="sendSuggestion('Write a Python web scraper')">Write a web scraper</span>
      <span class="suggestion" onclick="sendSuggestion('What are 5 productivity tips?')">Productivity tips</span>
      <span class="suggestion" onclick="sendSuggestion('Explain how neural networks work')">How neural networks work</span>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-outer">
    <div class="input-box">
      <div class="input-row">
        <textarea id="user-input" placeholder="Message Nexus AI..." rows="1"></textarea>
        <div class="input-actions">
          <button id="mic-btn" onclick="toggleMic()" title="Voice input">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
              <line x1="12" y1="19" x2="12" y2="23"></line>
              <line x1="8" y1="23" x2="16" y2="23"></line>
            </svg>
          </button>
          <button id="send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>
    </div>
    <div class="hint">Enter to send · Shift+Enter for new line</div>
  </div>
</div>

<script>
  const sessionId = Math.random().toString(36).slice(2);
  const chatContainer = document.getElementById('chat-container');
  const input = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  let isStreaming = false;

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 160) + 'px';
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!isStreaming) sendMessage();
    }
  });

  // ── MIC (speech to text only) ──
  let recognition = null;
  let isRecording = false;

  function toggleMic() {
    if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
      alert('Speech recognition not supported. Please use Chrome or Edge.');
      return;
    }
    if (isRecording) { recognition.stop(); return; }

    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.lang = 'en-US';
    recognition.interimResults = true;

    recognition.onstart = () => {
      isRecording = true;
      document.getElementById('mic-btn').classList.add('recording');
      input.placeholder = 'Listening...';
    };

    recognition.onresult = (e) => {
      const t = Array.from(e.results).map(r => r[0].transcript).join('');
      input.value = t;
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 160) + 'px';
    };

    recognition.onend = () => {
      isRecording = false;
      document.getElementById('mic-btn').classList.remove('recording');
      input.placeholder = 'Message Nexus AI...';
      if (input.value.trim()) sendMessage();
    };

    recognition.onerror = () => {
      isRecording = false;
      document.getElementById('mic-btn').classList.remove('recording');
      input.placeholder = 'Message Nexus AI...';
    };

    recognition.start();
  }

  function addMessage(role, content = '') {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const msg = document.createElement('div');
    msg.className = `message ${role}`;

    const inner = document.createElement('div');
    inner.className = 'message-inner';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'You' : 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = content;

    inner.appendChild(avatar);
    inner.appendChild(bubble);
    msg.appendChild(inner);
    chatContainer.appendChild(msg);
    chatContainer.scrollTop = chatContainer.scrollHeight;
    return bubble;
  }

  async function sendMessage(text) {
    const msg = text || input.value.trim();
    if (!msg || isStreaming) return;

    input.value = '';
    input.style.height = 'auto';
    isStreaming = true;
    sendBtn.disabled = true;

    addMessage('user', msg);
    const aiBubble = addMessage('ai', 'Thinking...');

    try {
      const resp = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg, session_id: sessionId })
      });
      const data = await resp.json();
      aiBubble.textContent = data.reply || 'No response received.';
    } catch (e) {
      aiBubble.textContent = 'Something went wrong. Please try again.';
    }

    chatContainer.scrollTop = chatContainer.scrollHeight;
    isStreaming = false;
    sendBtn.disabled = false;
    input.focus();
  }

  function sendSuggestion(text) { sendMessage(text); }

  async function clearChat() {
    await fetch('/clear', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId })
    });
    chatContainer.innerHTML = `
      <div class="welcome" id="welcome">
        <div class="welcome-icon">✦</div>
        <h2>How can I help you?</h2>
        <p>Ask me anything. Powered by Llama 3.3 70B via Groq.</p>
        <div class="suggestions">
          <span class="suggestion" onclick="sendSuggestion('Explain quantum computing simply')">Explain quantum computing</span>
          <span class="suggestion" onclick="sendSuggestion('Write a Python web scraper')">Write a web scraper</span>
          <span class="suggestion" onclick="sendSuggestion('What are 5 productivity tips?')">Productivity tips</span>
          <span class="suggestion" onclick="sendSuggestion('Explain how neural networks work')">How neural networks work</span>
        </div>
      </div>`;
  }

  input.focus();
</script>
</body>
</html>
