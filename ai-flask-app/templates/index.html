<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus AI</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222;
    --border: #2a2a2a;
    --accent: #10a37f;
    --accent-dim: rgba(16,163,127,0.1);
    --text: #ececec;
    --text-muted: #8a8a8a;
    --text-faint: #444;
    --radius: 12px;
    --drawer-width: 280px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── OVERLAY ── */
  #drawer-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 100;
    backdrop-filter: blur(2px);
  }
  #drawer-overlay.open { display: block; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

  /* ── DRAWER ── */
  #drawer {
    position: fixed;
    top: 0; left: 0;
    width: var(--drawer-width);
    height: 100vh;
    background: #141414;
    border-right: 1px solid var(--border);
    z-index: 101;
    display: flex;
    flex-direction: column;
    transform: translateX(-100%);
    transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
  }
  #drawer.open { transform: translateX(0); }

  .drawer-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 16px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .drawer-title {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .drawer-close {
    width: 28px; height: 28px;
    border-radius: 6px;
    border: none;
    background: none;
    color: var(--text-muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    font-size: 1rem;
  }
  .drawer-close:hover { background: var(--surface2); color: var(--text); }

  .new-chat-btn {
    margin: 12px 12px 8px;
    padding: 9px 14px;
    background: var(--accent-dim);
    border: 1px solid rgba(16,163,127,0.25);
    border-radius: 9px;
    color: var(--accent);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .new-chat-btn:hover { background: rgba(16,163,127,0.18); border-color: rgba(16,163,127,0.4); }
  .new-chat-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

  #history-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 8px 16px;
  }
  #history-list::-webkit-scrollbar { width: 3px; }
  #history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .history-section-label {
    font-size: 0.68rem;
    color: var(--text-faint);
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 10px 8px 5px;
  }

  .history-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.12s;
    position: relative;
    border: 1px solid transparent;
  }
  .history-item:hover { background: var(--surface2); }
  .history-item.active { background: var(--surface); border-color: var(--border); }

  .history-item-icon {
    width: 20px; height: 20px;
    flex-shrink: 0;
    color: var(--text-faint);
    display: flex; align-items: center; justify-content: center;
  }
  .history-item-icon svg { width: 14px; height: 14px; }

  .history-item-text {
    flex: 1;
    font-size: 0.82rem;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
  }
  .history-item.active .history-item-text { color: var(--text); }

  .history-item-del {
    width: 22px; height: 22px;
    border-radius: 5px;
    border: none;
    background: none;
    color: var(--text-faint);
    cursor: pointer;
    display: none;
    align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.12s;
    font-size: 0.8rem;
  }
  .history-item:hover .history-item-del { display: flex; }
  .history-item-del:hover { background: rgba(229,62,62,0.12); color: #e53e3e; }

  .empty-history {
    padding: 28px 12px;
    text-align: center;
    color: var(--text-faint);
    font-size: 0.8rem;
    line-height: 1.7;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 54px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  #history-toggle {
    width: 34px; height: 34px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: none;
    color: var(--text-muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  #history-toggle:hover { border-color: #3a3a3a; color: var(--text); background: var(--surface); }
  #history-toggle svg { width: 16px; height: 16px; }

  .logo {
    display: flex;
    align-items: center;
    gap: 9px;
    font-weight: 600;
    font-size: 0.95rem;
    letter-spacing: -0.01em;
  }

  .logo-mark {
    width: 26px; height: 26px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; color: white; font-weight: 700;
  }

  .clear-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 5px 13px;
    border-radius: 7px;
    cursor: pointer;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.78rem;
    transition: all 0.15s;
  }
  .clear-btn:hover { border-color: #3a3a3a; color: var(--text); background: var(--surface); }

  /* ── CHAT ── */
  #chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 28px 0 8px;
    display: flex;
    flex-direction: column;
    scroll-behavior: smooth;
  }
  #chat-container::-webkit-scrollbar { width: 4px; }
  #chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 12px;
    padding: 40px 20px;
    animation: fadeUp 0.35s ease-out;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .welcome-icon {
    width: 48px; height: 48px;
    background: var(--accent);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem; margin-bottom: 4px;
  }

  .welcome h2 {
    font-size: 1.3rem; font-weight: 600;
    letter-spacing: -0.02em;
  }

  .welcome p {
    font-size: 0.85rem; color: var(--text-muted);
    max-width: 340px; text-align: center; line-height: 1.6;
  }

  .suggestions {
    display: flex; flex-wrap: wrap; gap: 7px;
    justify-content: center; margin-top: 8px; max-width: 500px;
  }

  .suggestion {
    padding: 7px 15px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 0.8rem; color: var(--text-muted);
    cursor: pointer; transition: all 0.15s;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .suggestion:hover { border-color: var(--accent); color: var(--text); background: var(--accent-dim); }

  .message {
    padding: 10px 0;
    animation: fadeUp 0.2s ease-out;
  }

  .message-inner {
    max-width: 700px;
    margin: 0 auto;
    padding: 0 22px;
    display: flex;
    gap: 13px;
    align-items: flex-start;
  }

  .avatar {
    width: 28px; height: 28px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.68rem; font-weight: 600;
    flex-shrink: 0; margin-top: 2px;
  }
  .message.user .avatar { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
  .message.ai .avatar { background: var(--accent); color: white; }

  .bubble {
    flex: 1;
    line-height: 1.7;
    font-size: 0.9rem;
    padding-top: 2px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* ── INPUT ── */
  .input-area {
    padding: 10px 20px 22px;
    flex-shrink: 0;
    margin-bottom: 60px;
  }

  .input-outer { max-width: 700px; margin: 0 auto; }

  .input-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .input-box:focus-within {
    border-color: #3a3a3a;
    box-shadow: 0 0 0 3px rgba(16,163,127,0.06);
  }

  .input-row {
    display: flex;
    align-items: flex-end;
    padding: 10px 10px 10px 14px;
    gap: 8px;
  }

  #user-input {
    flex: 1;
    background: none;
    border: none; outline: none;
    color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.9rem;
    resize: none;
    max-height: 160px;
    line-height: 1.55;
    padding: 2px 0;
  }
  #user-input::placeholder { color: var(--text-faint); }

  .input-actions {
    display: flex; align-items: center; gap: 6px; flex-shrink: 0;
  }

  #mic-btn {
    width: 34px; height: 34px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: none;
    color: var(--text-muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  #mic-btn svg { width: 15px; height: 15px; }
  #mic-btn:hover { border-color: #3a3a3a; color: var(--text); background: var(--surface2); }
  #mic-btn.recording {
    border-color: #e53e3e; color: #e53e3e;
    background: rgba(229,62,62,0.08);
    animation: recPulse 1.2s ease-in-out infinite;
  }
  @keyframes recPulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(229,62,62,0.3); }
    50% { box-shadow: 0 0 0 4px rgba(229,62,62,0); }
  }

  #send-btn {
    width: 34px; height: 34px;
    border-radius: 8px;
    background: var(--accent);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  #send-btn:hover { background: #0d8f6e; }
  #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  #send-btn svg { width: 15px; height: 15px; }

  .hint {
    font-size: 0.7rem; color: var(--text-faint);
    margin-top: 8px; text-align: center;
  }

  /* ── SAVE INDICATOR ── */
  #save-indicator {
    position: fixed;
    bottom: 16px; right: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 13px;
    font-size: 0.75rem;
    color: var(--text-muted);
    display: flex; align-items: center; gap: 6px;
    opacity: 0;
    transition: opacity 0.25s;
    pointer-events: none;
    z-index: 50;
  }
  #save-indicator.show { opacity: 1; }
  .save-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: sdPulse 1s infinite;
  }
  @keyframes sdPulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
</style>
</head>
<body>

<!-- Overlay -->
<div id="drawer-overlay" onclick="closeDrawer()"></div>

<!-- Slide-out Drawer -->
<div id="drawer">
  <div class="drawer-header">
    <span class="drawer-title">Chat History</span>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>

  <button class="new-chat-btn" onclick="startNewChat()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"></line>
      <line x1="5" y1="12" x2="19" y2="12"></line>
    </svg>
    New Chat
  </button>

  <div id="history-list">
    <div class="empty-history" id="empty-history">No chats yet.<br>Start a conversation!</div>
  </div>
</div>

<!-- Save indicator -->
<div id="save-indicator">
  <div class="save-dot"></div>
  Saving…
</div>

<header>
  <div class="header-left">
    <button id="history-toggle" onclick="openDrawer()" title="Chat history">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>
    <div class="logo">
      <div class="logo-mark">N</div>
      Nexus AI
    </div>
  </div>
  <button class="clear-btn" onclick="startNewChat()">New chat</button>
</header>

<div id="chat-container">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">✦</div>
    <h2>How can I help you?</h2>
    <p>Ask me anything. Powered by Llama 3.3 70B via Groq.</p>
    <div class="suggestions">
      <span class="suggestion" onclick="sendSuggestion('Explain quantum computing simply')">Explain quantum computing</span>
      <span class="suggestion" onclick="sendSuggestion('Write a Python web scraper')">Write a web scraper</span>
      <span class="suggestion" onclick="sendSuggestion('What are 5 productivity tips?')">Productivity tips</span>
      <span class="suggestion" onclick="sendSuggestion('Explain how neural networks work')">How neural networks work</span>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-outer">
    <div class="input-box">
      <div class="input-row">
        <textarea id="user-input" placeholder="Message Nexus AI..." rows="1"></textarea>
        <div class="input-actions">
          <button id="mic-btn" onclick="toggleMic()" title="Voice input">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
              <line x1="12" y1="19" x2="12" y2="23"></line>
              <line x1="8" y1="23" x2="16" y2="23"></line>
            </svg>
          </button>
          <button id="send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>
    </div>
    <div class="hint">Enter to send · Shift+Enter for new line</div>
  </div>
</div>

<script>
  // ── STATE ──
  let currentSessionId = generateId();
  let currentMessages = [];
  let isStreaming = false;

  const chatContainer = document.getElementById('chat-container');
  const input = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');

  function generateId() {
    return Math.random().toString(36).slice(2) + Date.now().toString(36);
  }

  // ── SAVE INDICATOR ──
  function showSaveIndicator() {
    const el = document.getElementById('save-indicator');
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 1400);
  }

  // ── BACKEND API ──
  // Saves chat to your backend. Falls back to localStorage if unreachable.
  async function backendSaveChat(sessionId, messages, title) {
    try {
      const res = await fetch('/history/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId, messages, title })
      });
      if (!res.ok) throw new Error();
    } catch {
      // localStorage fallback
      const all = getLocalChats();
      all[sessionId] = { session_id: sessionId, title, messages, updatedAt: Date.now() };
      localStorage.setItem('nexus_chats', JSON.stringify(all));
    }
  }

  async function backendListChats() {
    try {
      const res = await fetch('/history/list');
      if (!res.ok) throw new Error();
      return await res.json(); // [{session_id, title, updatedAt}]
    } catch {
      return Object.values(getLocalChats()).sort((a,b) => b.updatedAt - a.updatedAt);
    }
  }

  async function backendLoadChat(sessionId) {
    try {
      const res = await fetch(`/history/load?session_id=${encodeURIComponent(sessionId)}`);
      if (!res.ok) throw new Error();
      return await res.json(); // {messages:[...]}
    } catch {
      return getLocalChats()[sessionId] || null;
    }
  }

  async function backendDeleteChat(sessionId) {
    try {
      const res = await fetch('/history/delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId })
      });
      if (!res.ok) throw new Error();
    } catch {
      const all = getLocalChats();
      delete all[sessionId];
      localStorage.setItem('nexus_chats', JSON.stringify(all));
    }
  }

  function getLocalChats() {
    try { return JSON.parse(localStorage.getItem('nexus_chats') || '{}'); } catch { return {}; }
  }

  // ── DRAWER ──
  function openDrawer() {
    document.getElementById('drawer').classList.add('open');
    document.getElementById('drawer-overlay').classList.add('open');
    renderHistoryList();
  }

  function closeDrawer() {
    document.getElementById('drawer').classList.remove('open');
    document.getElementById('drawer-overlay').classList.remove('open');
  }

  // ── HISTORY LIST ──
  async function renderHistoryList() {
    const list = document.getElementById('history-list');
    const empty = document.getElementById('empty-history');

    // Remove old items
    list.querySelectorAll('.history-section-label, .history-item').forEach(el => el.remove());

    const chats = await backendListChats();

    if (!chats || chats.length === 0) {
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    // Group by recency
    const now = Date.now();
    const groups = { 'Today': [], 'Yesterday': [], 'Previous 7 Days': [], 'Older': [] };
    chats.forEach(chat => {
      const days = (now - (chat.updatedAt || 0)) / 86400000;
      if (days < 1) groups['Today'].push(chat);
      else if (days < 2) groups['Yesterday'].push(chat);
      else if (days < 7) groups['Previous 7 Days'].push(chat);
      else groups['Older'].push(chat);
    });

    Object.entries(groups).forEach(([label, items]) => {
      if (!items.length) return;

      const sec = document.createElement('div');
      sec.className = 'history-section-label';
      sec.textContent = label;
      list.appendChild(sec);

      items.forEach(chat => {
        const item = document.createElement('div');
        item.className = 'history-item' + (chat.session_id === currentSessionId ? ' active' : '');
        item.dataset.sid = chat.session_id;

        const icon = document.createElement('div');
        icon.className = 'history-item-icon';
        icon.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>`;

        const text = document.createElement('div');
        text.className = 'history-item-text';
        text.textContent = chat.title || 'Untitled Chat';

        const del = document.createElement('button');
        del.className = 'history-item-del';
        del.title = 'Delete';
        del.textContent = '✕';
        del.addEventListener('click', async (e) => {
          e.stopPropagation();
          await backendDeleteChat(chat.session_id);
          if (chat.session_id === currentSessionId) startNewChat();
          else renderHistoryList();
        });

        item.appendChild(icon);
        item.appendChild(text);
        item.appendChild(del);
        item.addEventListener('click', () => loadChat(chat.session_id));
        list.appendChild(item);
      });
    });
  }

  // ── LOAD CHAT ──
  async function loadChat(sessionId) {
    closeDrawer();
    const data = await backendLoadChat(sessionId);
    if (!data || !data.messages || !data.messages.length) return;

    currentSessionId = sessionId;
    currentMessages = data.messages;

    chatContainer.innerHTML = '';
    data.messages.forEach(m => renderMessage(m.role, m.content));
    chatContainer.scrollTop = chatContainer.scrollHeight;
  }

  // ── NEW CHAT ──
  function startNewChat() {
    currentSessionId = generateId();
    currentMessages = [];
    chatContainer.innerHTML = `
      <div class="welcome" id="welcome">
        <div class="welcome-icon">✦</div>
        <h2>How can I help you?</h2>
        <p>Ask me anything. Powered by Llama 3.3 70B via Groq.</p>
        <div class="suggestions">
          <span class="suggestion" onclick="sendSuggestion('Explain quantum computing simply')">Explain quantum computing</span>
          <span class="suggestion" onclick="sendSuggestion('Write a Python web scraper')">Write a web scraper</span>
          <span class="suggestion" onclick="sendSuggestion('What are 5 productivity tips?')">Productivity tips</span>
          <span class="suggestion" onclick="sendSuggestion('Explain how neural networks work')">How neural networks work</span>
        </div>
      </div>`;

    fetch('/clear', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: currentSessionId })
    }).catch(() => {});

    closeDrawer();
    input.focus();
  }

  // ── RENDER MESSAGE ──
  function renderMessage(role, content) {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const msg = document.createElement('div');
    msg.className = `message ${role}`;
    const inner = document.createElement('div');
    inner.className = 'message-inner';
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'You' : 'AI';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = content;

    inner.appendChild(avatar);
    inner.appendChild(bubble);
    msg.appendChild(inner);
    chatContainer.appendChild(msg);
    chatContainer.scrollTop = chatContainer.scrollHeight;
    return bubble;
  }

  // ── SEND MESSAGE ──
  async function sendMessage(text) {
    const msg = text || input.value.trim();
    if (!msg || isStreaming) return;

    input.value = '';
    input.style.height = 'auto';
    isStreaming = true;
    sendBtn.disabled = true;

    currentMessages.push({ role: 'user', content: msg });
    renderMessage('user', msg);
    const aiBubble = renderMessage('ai', 'Thinking…');

    try {
      const resp = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg, session_id: currentSessionId })
      });
      const data = await resp.json();
      const reply = data.reply || 'No response received.';
      aiBubble.textContent = reply;
      currentMessages.push({ role: 'ai', content: reply });

      // Auto-title from first user message (max 60 chars)
      const title = currentMessages.find(m => m.role === 'user')?.content?.slice(0, 60) || 'New Chat';
      showSaveIndicator();
      await backendSaveChat(currentSessionId, currentMessages, title);

    } catch {
      aiBubble.textContent = 'Something went wrong. Please try again.';
    }

    chatContainer.scrollTop = chatContainer.scrollHeight;
    isStreaming = false;
    sendBtn.disabled = false;
    input.focus();
  }

  function sendSuggestion(text) { sendMessage(text); }

  // ── TEXTAREA ──
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 160) + 'px';
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!isStreaming) sendMessage();
    }
  });

  // ── MIC ──
  let recognition = null;
  let isRecording = false;

  function toggleMic() {
    if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
      alert('Speech recognition not supported. Please use Chrome or Edge.');
      return;
    }
    if (isRecording) { recognition.stop(); return; }

    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.lang = 'en-US';
    recognition.interimResults = true;

    recognition.onstart = () => {
      isRecording = true;
      document.getElementById('mic-btn').classList.add('recording');
      input.placeholder = 'Listening...';
    };

    recognition.onresult = (e) => {
      const t = Array.from(e.results).map(r => r[0].transcript).join('');
      input.value = t;
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 160) + 'px';
    };

    recognition.onend = () => {
      isRecording = false;
      document.getElementById('mic-btn').classList.remove('recording');
      input.placeholder = 'Message Nexus AI...';
      if (input.value.trim()) sendMessage();
    };

    recognition.onerror = () => {
      isRecording = false;
      document.getElementById('mic-btn').classList.remove('recording');
      input.placeholder = 'Message Nexus AI...';
    };

    recognition.start();
  }

  input.focus();
</script>
</body>
</html>
